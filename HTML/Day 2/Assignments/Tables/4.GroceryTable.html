<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery List</title>
</head>
<body>

    <h2>Grocery List</h2>

    <table border="2">

        <thead>
            <tr>
                <th>S.No</th>
                <th>Item</th>
                <th>Quantity</th>
                <th>Price (Rs)</th>
            </tr>
        </thead>

        <tbody>
            <tr><td>1</td><td>Rice</td><td>2 kg</td><td>120</td></tr>
            <tr><td>2</td><td>Milk</td><td>1 L</td><td>50</td></tr>
            <tr><td>3</td><td>Eggs</td><td>12</td><td>90</td></tr>
            <tr><td>4</td><td>Vegetables</td><td>1 kg</td><td>80</td></tr>
            <tr><td>5</td><td>Bread</td><td>1 pack</td><td>40</td></tr>
            <tr><td>6</td><td>Sugar</td><td>1 kg</td><td>45</td></tr>
            <tr><td>7</td><td>Salt</td><td>1 packet</td><td>20</td></tr>
            <tr><td>8</td><td>Oil</td><td>1 L</td><td>150</td></tr>
            <tr><td>9</td><td>Tea Powder</td><td>250 g</td><td>110</td></tr>
            <tr><td>10</td><td>Biscuits</td><td>2 packs</td><td>60</td></tr>

            <tr>
                <td colspan="3"><strong>Total</strong></td>
                <td><strong>765</strong></td>
            </tr>
        </tbody>

    </table>

</body>
</html>
