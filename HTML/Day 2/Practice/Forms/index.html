<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>

    <form action="">

        <!-- Username -->
        <label for="username">Username:</label>
        <input type="text" autocomplete="off" placeholder="Enter Username" name="username" id="username"><br><br>

        <!-- Password -->
        <label for="password">Password:</label>
        <input type="password" autocomplete="off" placeholder="Enter Password" name="password" id="password"><br><br>

        <!-- Phone -->
        <label for="phone">Phone:</label>
        <input type="tel" autocomplete="off" placeholder="Enter Phone" name="phone" id="phone"><br><br>

        <!-- Email -->
        <label for="email">Email:</label>
        <input type="email" autocomplete="off" placeholder="Enter Email" name="email" id="email"><br><br>

        <!-- Gender -->
        <label>Gender:</label>
        <input type="radio" name="gender" value="male" id="male">
        <label for="male">Male</label>

        <input type="radio" name="gender" value="female" id="female">
        <label for="female">Female</label><br><br>

        <!-- Skills -->
        <label>Skills:</label>
        <input type="checkbox" name="skills" value="html" id="html">
        <label for="html">HTML</label>

        <input type="checkbox" name="skills" value="css" id="css">
        <label for="css">CSS</label><br><br>


        <label for="state">State:</label>
        <select name="state" id="state">

            <option value="Punjab">Punjab</option>
            <option value="Himachal">Himachal</option>
            <option value="Telangana">Telangana</option>

        </select>


        <label for="city">City:</label>
        <select name="city" id="city">

    <optgroup label="Punjab">
        <option value="Ludhiana">Ludhiana</option>
        <option value="Amritsar">Amritsar</option>
        <option value="Jalandhar">Jalandhar</option>
    </optgroup>

    <optgroup label="Himachal">
        <option value="Shimla">Shimla</option>
        <option value="Manali">Manali</option>
        <option value="Dharamshala">Dharamshala</option>
    </optgroup>

    <optgroup label="Telangana">
        <option value="Hyderabad">Hyderabad</option>
        <option value="Warangal">Warangal</option>
        <option value="Nizamabad">Nizamabad</option>
    </optgroup>

</select><br>

    <input type="text" value="Readonly Field" readonly><br>
    <input type="text" value="Disabled Field" disabled><br>

        <input type="file" > <br>

        <input type="datetime-local" ><br>

        <input min="0" max="100" step="10" type="range"><br>

        <input type="reset" value="Reset">
        <!-- Submit -->
        <input type="submit" value="Submit">

    </form>

</body>
</html>
