<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .container {
        width: 100px;
        height: 100px;
        position: static;
        background-color: blue;
        border: 1px solid black;
      }
      .items {
        width: 100px;
        height: 100px;
        background-color: lightblue;
        border: 1px solid black;
      }

      .item1 {
        position: absolute;
        top: 10px;
        left: 10px;
      }

      .item1 {
        position: sticky;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h3 class="items item1">Item1</h3>
      <h3 class="items item2">Item2</h3>
      <h3 class="items item3">Item3</h3>
    </div>
  </body>
</html>
