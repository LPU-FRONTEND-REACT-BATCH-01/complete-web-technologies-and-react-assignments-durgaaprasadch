<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React – The library for web and native user interfaces</title>
    <link rel="stylesheet" href="react-homepage-styles.css" />
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav class="navbar" role="navigation">
      <div class="nav-container">
        <div class="nav-left">
          <!-- Logo and Version -->
          <div class="logo-container">
            <svg
              class="react-logo-small"
              viewBox="0 0 100 100"
              xmlns="http://www.w3.org/2000/svg"
            >
              <g fill="none">
                <ellipse cx="50" cy="50" rx="35" ry="12.5" stroke="#149ECA" stroke-width="4.5"/>
                <ellipse
                  cx="50"
                  cy="50"
                  rx="35"
                  ry="12.5"
                  stroke="#149ECA"
                  stroke-width="4.5"
                  transform="rotate(60 50 50)"
                />
                <ellipse
                  cx="50"
                  cy="50"
                  rx="35"
                  ry="12.5"
                  stroke="#149ECA"
                  stroke-width="4.5"
                  transform="rotate(120 50 50)"
                />
                <circle cx="50" cy="50" r="5.5" fill="#149ECA" />
              </g>
            </svg>
            <span class="version">v19.2</span>
          </div>

          <!-- Search Bar -->
          <div class="search-container">
            <svg
              class="search-icon"
              width="16"
              height="16"
              viewBox="0 0 16 16"
              fill="none"
            >
              <circle
                cx="7"
                cy="7"
                r="5.5"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <path
                d="M11 11L14.5 14.5"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
            <input
              type="text"
              placeholder="Search"
              class="search-input"
              aria-label="Search documentation"
            />
            <div class="search-kbd">
              <kbd>ctrl</kbd>
              <kbd>K</kbd>
            </div>
          </div>
        </div>

        <!-- Navigation Links -->
        <div class="nav-right">
          <a href="#learn" class="nav-link">Learn</a>
          <a href="#reference" class="nav-link">Reference</a>
          <a href="#community" class="nav-link">Community</a>
          <a href="#blog" class="nav-link">Blog</a>

          <!-- Icon Buttons -->
          <div class="nav-icons">
            <button class="icon-btn" aria-label="Toggle theme">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="12" cy="12" r="4" stroke-width="2" />
                <path
                  d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>

            <button class="icon-btn" aria-label="Change language">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="12" cy="12" r="9" stroke-width="2" />
                <path
                  d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
                  stroke-width="2"
                />
              </svg>
            </button>

            <a
              href="https://github.com/facebook/react"
              class="icon-btn"
              aria-label="Visit GitHub repository"
              target="_blank"
              rel="noopener noreferrer"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path
                  d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"
                />
              </svg>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Hero Section -->
    <main class="hero-section" role="main">
      <div class="hero-content">
        <!-- Animated React Logo -->
        <div class="logo-wrapper">
          <svg
            class="react-logo-large"
            viewBox="0 0 230 230"
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <filter id="glow">
                <feGaussianBlur stdDeviation="3" result="coloredBlur" />
                <feMerge>
                  <feMergeNode in="coloredBlur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>
            <g fill="none" filter="url(#glow)">
              <ellipse
                cx="115"
                cy="115"
                rx="88"
                ry="33"
                stroke="#149ECA"
                stroke-width="6"
                stroke-linecap="round"
              />
              <ellipse
                cx="115"
                cy="115"
                rx="88"
                ry="33"
                stroke="#149ECA"
                stroke-width="6"
                stroke-linecap="round"
                transform="rotate(60 115 115)"
              />
              <ellipse
                cx="115"
                cy="115"
                rx="88"
                ry="33"
                stroke="#149ECA"
                stroke-width="6"
                stroke-linecap="round"
                transform="rotate(120 115 115)"
              />
              <circle cx="115" cy="115" r="12" fill="#149ECA" />
            </g>
          </svg>
        </div>

        <!-- Main Heading -->
        <h1 class="hero-title">React</h1>

        <!-- Subtitle -->
        <p class="hero-subtitle">
          The library for web and native user interfaces
        </p>

        <!-- Call-to-Action Buttons -->
        <div class="cta-buttons">
          <a href="https://react.dev/learn" class="btn btn-primary"
            >Learn React</a
          >
          <a href="https://react.dev/reference/react" class="btn btn-secondary"
            >API Reference</a
          >
        </div>
      </div>
    </main>

    <!-- URL Display Bar (bottom left) -->
    <div class="url-display" role="status" aria-live="polite">
      https://react.dev/learn
    </div>
  </body>
</html>
