<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React</title>
    <link rel="stylesheet" href="react-dev-styles.css" />
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav class="navbar">
      <div class="nav-left">
        <div class="logo-container">
          <svg
            class="react-logo-small"
            viewBox="0 0 100 100"
            xmlns="http://www.w3.org/2000/svg"
          >
            <g fill="none" stroke="#149ECA" stroke-width="6">
              <ellipse cx="50" cy="50" rx="35" ry="12" />
              <ellipse
                cx="50"
                cy="50"
                rx="35"
                ry="12"
                transform="rotate(60 50 50)"
              />
              <ellipse
                cx="50"
                cy="50"
                rx="35"
                ry="12"
                transform="rotate(120 50 50)"
              />
              <circle cx="50" cy="50" r="5" fill="#149ECA" />
            </g>
          </svg>
          <span class="version">v19.2</span>
        </div>

        <div class="search-container">
          <svg
            class="search-icon"
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="none"
          >
            <path
              d="M7 13C10.3137 13 13 10.3137 13 7C13 3.68629 10.3137 1 7 1C3.68629 1 1 3.68629 1 7C1 10.3137 3.68629 13 7 13Z"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <path
              d="M11.5 11.5L15 15"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
          <input type="text" placeholder="Search" class="search-input" />
          <kbd class="search-kbd">
            <span>ctrl</span>
            <span>K</span>
          </kbd>
        </div>
      </div>

      <div class="nav-right">
        <a href="#" class="nav-link">Learn</a>
        <a href="#" class="nav-link">Reference</a>
        <a href="#" class="nav-link">Community</a>
        <a href="#" class="nav-link">Blog</a>

        <div class="nav-icons">
          <!-- Theme Toggle -->
          <button class="icon-btn" aria-label="Toggle theme">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <circle
                cx="12"
                cy="12"
                r="5"
                stroke="currentColor"
                stroke-width="2"
              />
              <line
                x1="12"
                y1="1"
                x2="12"
                y2="3"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <line
                x1="12"
                y1="21"
                x2="12"
                y2="23"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <line
                x1="4.22"
                y1="4.22"
                x2="5.64"
                y2="5.64"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <line
                x1="18.36"
                y1="18.36"
                x2="19.78"
                y2="19.78"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <line
                x1="1"
                y1="12"
                x2="3"
                y2="12"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <line
                x1="21"
                y1="12"
                x2="23"
                y2="12"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <line
                x1="4.22"
                y1="19.78"
                x2="5.64"
                y2="18.36"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <line
                x1="18.36"
                y1="5.64"
                x2="19.78"
                y2="4.22"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>

          <!-- Language Toggle -->
          <button class="icon-btn" aria-label="Change language">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <circle
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="2"
              />
              <path
                d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
                stroke="currentColor"
                stroke-width="2"
              />
            </svg>
          </button>

          <!-- GitHub Link -->
          <a href="#" class="icon-btn" aria-label="GitHub">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"
              />
            </svg>
          </a>
        </div>
      </div>
    </nav>

    <!-- Main Hero Section -->
    <main class="hero-section">
      <div class="hero-content">
        <!-- React Logo SVG -->
        <svg
          class="react-logo-large"
          viewBox="0 0 200 200"
          xmlns="http://www.w3.org/2000/svg"
        >
          <g fill="none" stroke="#149ECA" stroke-width="8">
            <!-- Outer ellipses (orbits) -->
            <ellipse cx="100" cy="100" rx="80" ry="30" />
            <ellipse
              cx="100"
              cy="100"
              rx="80"
              ry="30"
              transform="rotate(60 100 100)"
            />
            <ellipse
              cx="100"
              cy="100"
              rx="80"
              ry="30"
              transform="rotate(120 100 100)"
            />
            <!-- Center circle (nucleus) -->
            <circle cx="100" cy="100" r="12" fill="#149ECA" />
          </g>
        </svg>

        <!-- Title -->
        <h1 class="hero-title">React</h1>

        <!-- Subtitle -->
        <p class="hero-subtitle">
          The library for web and native user interfaces
        </p>

        <!-- CTA Buttons -->
        <div class="cta-buttons">
          <a href="#" class="btn btn-primary">Learn React</a>
          <a href="#" class="btn btn-secondary">API Reference</a>
        </div>
      </div>
    </main>
  </body>
</html>
