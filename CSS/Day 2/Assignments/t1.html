<!doctype html>
<html lang="en">
  <head>
    <style>
      .container {
        width: 400px;
        margin: 50px;
      }

      h2 {
        padding: 30px;
        text-align: center;
        font-family: monospace;
      }

      h2:hover {
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 50px darkgray;
        letter-spacing: 2px;
      }

      h2::first-letter {
        color: purple;
        font-size: 30px;
      }

      p {
        text-align: center;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>The only way to do great work is to love what you do.</h2>
      <p>- Steve Jobs</p>
    </div>
  </body>
</html>
