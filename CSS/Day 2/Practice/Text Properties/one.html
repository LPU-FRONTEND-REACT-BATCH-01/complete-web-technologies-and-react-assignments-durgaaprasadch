<!doctype html>
<html>
  <head>
    <title>Text Properties</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      h1 {
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: darkblue;
      }

      p {
        font-size: 18px;
        line-height: 1.6;
        text-align: justify;
        color: #333;
      }

      .underline {
        text-decoration: underline;
      }

      .spacing {
        word-spacing: 10px;
      }

      .shadow {
        text-shadow: 2px 2px 5px gray;
      }
    </style>
  </head>

  <body>
    <h1 class="shadow">CSS Text Properties</h1>

    <p>
      This paragraph shows normal text styling using CSS properties like font
      size, line height, and alignment.
    </p>

    <p class="underline">This line is underlined using text-decoration.</p>

    <p class="spacing">This paragraph has extra spacing between words.</p>
  </body>
</html>
